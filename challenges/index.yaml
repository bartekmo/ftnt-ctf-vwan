# Xperts26 vWAN CTF — Challenge Index
#
# Challenges are solved sequentially. Later challenges depend on earlier ones
# being completed (e.g. BGP configuration requires the VPN tunnel to be up).
#
# Fields:
#   id          string   unique slug, matches directory name
#   title       string   displayed in sidebar and challenge header
#   category    enum     networking | vpn | routing | security | monitoring | misc
#   points      int      base score awarded on solve (0 = informational, not scored)
#   scored      bool     false = informational only, no prober, no points
#   prober      string   prober function name (omit if scored: false)
#   visible     bool     false = hidden until trainer makes visible
#
# Hints are defined inside each challenge's MDX frontmatter, not here.

challenges:
  - id: 00-access-azure
    title: "Verify access"
    category: misc
    points: 0
    scored: false
    visible: true

  - id: 01-deploy-nvas
    title: "Deploy the FortiGate NVAs"
    category: Azure
    points: 150
    scored: true
    prober: check_nva_deployed
    visible: true

  - id: 02-license-nvas
    title: "License the FortiGate NVAs"
    category: FortiGate
    points: 100
    scored: true
    prober: check_nva_licensed
    visible: true

  - id: 08-intent-routing
    title: "Azure intent routing configuration"
    category: Azure vWAN
    points: 50
    scored: true
    prober: arm_intent_routing
    visible: true

  - id: 06-spoke-peering
    title: "Peer the Spoke VNet"
    category: Azure vWAN
    points: 100
    scored: true
    prober: check_spoke_peered
    visible: true

  - id: 03-configure-bgp
    title: "Configure BGP on the FortiGate NVAs"
    category: routing
    points: 150
    scored: true
    prober: check_nva_bgp
    visible: true

  - id: 09-fgsp
    title: "Enable FGSP between FortiGates"
    category: FortiGate
    points: 80
    scored: true
    prober: fgt_fgsp
    visible: true

  - id: 10-allow-ew-traffic
    title: "Allow cross-regional traffic"
    points: 100
    scored: true
    prober: spoke_ew
    visible: true

  - id: 04-vwan-ingress
    title: "Configure internet inbound"
    points: 200
    scored: true
    prober: slb_inbound
    visible: true

  - id: 11-overlay-template
    title: "Create an SD-WAN overlay template"
    category: FortiManager
    points: 120
    scored: true
