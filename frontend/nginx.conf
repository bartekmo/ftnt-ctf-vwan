server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Raise header buffer limits — default 1k/4k is too small for JWT
    # Authorization headers and larger cookie payloads.
    client_header_buffer_size   16k;
    large_client_header_buffers 4 16k;

    location /api/ {
        proxy_pass ${API_URL}/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;

        # Propagate large headers (e.g. Authorization: Bearer <jwt>) upstream
        proxy_buffer_size          16k;
        proxy_buffers              4 16k;
    }

    location /ws/ {
        proxy_pass ${API_URL}/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
