server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Increase buffer sizes for JWT Authorization headers
    client_header_buffer_size   16k;
    large_client_header_buffers 4 16k;

    # Proxy /api and /ws to the API container.
    # In ACA both apps share the same environment — ctf-api resolves via
    # ACA's internal DNS. Traffic never leaves the environment.
    # In Docker Compose, API_URL=http://api:8000 via the Docker network.
    # envsubst at startup replaces only $API_URL; all nginx $variables are preserved.
    location /api/ {
        proxy_pass $API_URL/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffer_size 16k;
        proxy_buffers     4 16k;
    }

    location /ws/ {
        proxy_pass $API_URL/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
