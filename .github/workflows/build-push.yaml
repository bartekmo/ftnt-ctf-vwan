name: Build & Push Images

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/build-push.yml"
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}   # e.g. xperts26ctf.azurecr.io

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    # Only rebuild when backend files changed
    outputs:
      changed: ${{ steps.filter.outputs.backend }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/build-push.yml'

      - name: Log in to ACR
        if: steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        if: steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        if: steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/ctf-api:latest
            ${{ env.REGISTRY }}/ctf-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/ctf-api:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/ctf-api:buildcache,mode=max

  # ── Frontend ───────────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/build-push.yml'

      - name: Log in to ACR
        if: steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        if: steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        if: steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/ctf-frontend:latest
            ${{ env.REGISTRY }}/ctf-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/ctf-frontend:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/ctf-frontend:buildcache,mode=max

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Restart Azure Container Instances
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    # Only run if at least one image was actually rebuilt
    if: |
      needs.build-backend.outputs.changed == 'true' ||
      needs.build-frontend.outputs.changed == 'true' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart API container
        if: needs.build-backend.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az container restart \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ctf-api

      - name: Restart frontend container
        if: needs.build-frontend.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az container restart \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ctf-frontend