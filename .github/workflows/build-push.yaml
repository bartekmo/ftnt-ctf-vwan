name: Build & Push Images

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/build-push.yml"
  workflow_dispatch:

# Required for OIDC token request
permissions:
  id-token: write   # request JWT from GitHub's OIDC provider
  contents: read    # checkout the repo

env:
  REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}   # e.g. xperts26ctf.azurecr.io (non-secret var)

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.backend }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/build-push.yml'

      - name: Azure login (OIDC)
        if: steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR via OIDC token
        if: steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        run: az acr login --name ${{ vars.ACR_LOGIN_SERVER }}

      - name: Set up Docker Buildx
        if: steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        if: steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/ctf-api:latest
            ${{ env.REGISTRY }}/ctf-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/ctf-api:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/ctf-api:buildcache,mode=max

  # ── Frontend ───────────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/build-push.yml'

      - name: Azure login (OIDC)
        if: steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR via OIDC token
        if: steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        run: az acr login --name ${{ vars.ACR_LOGIN_SERVER }}

      - name: Set up Docker Buildx
        if: steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        if: steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/ctf-frontend:latest
            ${{ env.REGISTRY }}/ctf-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/ctf-frontend:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/ctf-frontend:buildcache,mode=max

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Update Container Apps
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: |
      needs.build-backend.outputs.changed == 'true' ||
      needs.build-frontend.outputs.changed == 'true' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Container Apps update is done by pointing to the new :latest image.
      # Container Apps pulls :latest from ACR using its managed identity —
      # no registry credentials needed at deploy time either.

      - name: Update API container app
        if: needs.build-backend.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --name ctf-api \
              --image ${{ env.REGISTRY }}/ctf-api:${{ github.sha }}

      - name: Update frontend container app
        if: needs.build-frontend.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --name ctf-frontend \
              --image ${{ env.REGISTRY }}/ctf-frontend:${{ github.sha }}