name: Build & Push Images

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "probers/**"
      - "challenges/index.yaml"
      - ".github/workflows/build-push.yaml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/build-push.yaml'
      - name: Azure login (OIDC)
        if: steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Log in to ACR via OIDC token
        if: steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        run: az acr login --name ${{ vars.ACR_LOGIN_SERVER }}
      - name: Set up Docker Buildx
        if: steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3
      - name: Build and push backend
        if: steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/ctf-api:latest
            ${{ env.REGISTRY }}/ctf-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/ctf-api:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/ctf-api:buildcache,mode=max

  # ── Frontend ───────────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'challenges/**'
              - '.github/workflows/build-push.yaml'
      - name: Azure login (OIDC)
        if: steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Log in to ACR via OIDC token
        if: steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        run: az acr login --name ${{ vars.ACR_LOGIN_SERVER }}
      - name: Set up Docker Buildx
        if: steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3
      - name: Build and push frontend
        if: steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/ctf-frontend:latest
            ${{ env.REGISTRY }}/ctf-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/ctf-frontend:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/ctf-frontend:buildcache,mode=max

  # ── Probers ────────────────────────────────────────────────────────────────
  build-probers:
    name: Build probers
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.probers }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            probers:
              - 'probers/**'
              - 'challenges/index.yaml'
              - '.github/workflows/build-push.yaml'
      - name: Azure login (OIDC)
        if: steps.filter.outputs.probers == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Log in to ACR via OIDC token
        if: steps.filter.outputs.probers == 'true' || github.event_name == 'workflow_dispatch'
        run: az acr login --name ${{ vars.ACR_LOGIN_SERVER }}
      - name: Set up Docker Buildx
        if: steps.filter.outputs.probers == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3
      - name: Build and push probers
        if: steps.filter.outputs.probers == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./probers/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/ctf-probers:latest
            ${{ env.REGISTRY }}/ctf-probers:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/ctf-probers:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/ctf-probers:buildcache,mode=max

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Update Container Apps
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-probers]
    if: |
      needs.build-backend.outputs.changed == 'true' ||
      needs.build-frontend.outputs.changed == 'true' ||
      needs.build-probers.outputs.changed == 'true' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update API container app
        if: needs.build-backend.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --name vwanlab-ctf-api \
              --image ${{ env.REGISTRY }}/ctf-api:${{ github.sha }}

      - name: Update frontend container app
        if: needs.build-frontend.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --name vwanlab-ctf-frontend \
              --image ${{ env.REGISTRY }}/ctf-frontend:${{ github.sha }}

      - name: Update probers job image
        if: needs.build-probers.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp job update \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --name vwanlab-ctf-probers \
              --image ${{ env.REGISTRY }}/ctf-probers:${{ github.sha }}
