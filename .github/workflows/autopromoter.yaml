name: Build & Push Autopromoter

on:
  push:
    branches: [main]
    paths:
      - "apps/autopromoter-az/**"
      - ".github/workflows/autopromoter.yaml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}

jobs:
  build-autopromoter:
    name: Build autopromoter
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.autopromoter }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            autopromoter:
              - 'apps/autopromoter-az/**'
              - '.github/workflows/autopromoter.yaml'
      - name: Azure login (OIDC)
        if: steps.filter.outputs.autopromoter == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Log in to ACR via OIDC token
        if: steps.filter.outputs.autopromoter == 'true' || github.event_name == 'workflow_dispatch'
        run: az acr login --name ${{ vars.ACR_LOGIN_SERVER }}
      - name: Set up Docker Buildx
        if: steps.filter.outputs.autopromoter == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3
      - name: Build and push autopromoter
        if: steps.filter.outputs.autopromoter == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/autopromoter-az
          file: ./apps/autopromoter-az/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/autopromoter:latest
            ${{ env.REGISTRY }}/autopromoter:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/autopromoter:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/autopromoter:buildcache,mode=max

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Update Container Apps
    runs-on: ubuntu-latest
    needs: [build-autopromoter]
    if: |
      needs.build-autopromoter.outputs.changed == 'true' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update autopromoter job image
        if: needs.build-autopromoter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp job update \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --name vwanlab-autopromoter \
              --image ${{ env.REGISTRY }}/autopromoter:${{ github.sha }}
